name: Build plugin

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build
        run: mvn -DskipTests package

      - uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: target/*.jar
